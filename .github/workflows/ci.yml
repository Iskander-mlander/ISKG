name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.14"
      - run: pip install ruff
      - run: ruff check iskg/

  typecheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.14"
      - run: pip install pyright pywebview
      - run: pip install -e .
      - run: pyright iskg/

  test:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-22.04, ubuntu-24.04]
        python-version: ["3.10", "3.11", "3.12", "3.13", "3.14"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install system deps (pywebview)
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq python3-gi python3-gi-cairo gir1.2-gtk-3.0
          apt-cache show gir1.2-webkit2-4.1 >/dev/null 2>&1 && \
            sudo apt-get install -y -qq gir1.2-webkit2-4.1 || \
            sudo apt-get install -y -qq gir1.2-webkit2-4.0
      - run: pip install -e ".[dev]"
      - run: pytest

  test-distros:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        container:
          - "fedora:41"
          - "debian:12"
          - "archlinux:latest"
    container:
      image: ${{ matrix.container }}
    steps:
      - uses: actions/checkout@v4
      - name: Install system deps
        run: |
          case "${{ matrix.container }}" in
            fedora*)
              dnf install -y python3 python3-pip python3-devel git
              echo "PIP_EXTRA=" >> $GITHUB_ENV
              ;;
            debian*)
              apt-get update -qq
              apt-get install -y -qq python3 python3-pip python3-dev git
              echo "PIP_EXTRA=" >> $GITHUB_ENV
              ;;
            archlinux*)
              pacman -Syu --noconfirm python python-pip git
              echo "PIP_EXTRA=--break-system-packages" >> $GITHUB_ENV
              ;;
          esac
      - name: Install project
        run: |
          python3 -m pip install $PIP_EXTRA -e ".[dev]"
      - name: Run tests
        run: |
          python3 -m pytest
